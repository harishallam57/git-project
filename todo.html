<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Priority Tasks - Developer Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <style>
        :root { --bg-main: #0f172a; --bg-surface: rgba(30, 41, 59, 0.6); --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3); --secondary: #8b5cf6; --text-main: #f8fafc; --text-muted: #94a3b8; --border-glass: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-top: 100px; }
        .glass-card { background: var(--bg-surface); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 20px; }
        .navbar { background: rgba(15, 23, 42, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-glass); padding: 1rem 0; z-index: 1000; }
        .gradient-text { background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .btn-premium { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; box-shadow: 0 4px 15px var(--primary-glow); transition: 0.3s; }
        .form-control { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 12px; padding: 12px 20px; }
        .form-control:focus { background: #1e293b; border-color: var(--primary); color: white; box-shadow: 0 0 10px var(--primary-glow); }
        .list-group-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 12px; transition: 0.3s; color: white; padding: 1.25rem 1.5rem; display: flex; align-items: center; }
        .list-group-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
        .btn-delete { color: #ef4444; background: none; border: none; opacity: 0.5; transition: 0.3s; }
        .btn-delete:hover { opacity: 1; transform: scale(1.1); }
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html"><span class="gradient-text">🛠 ToolKit</span></a>
            <a href="index.html" class="btn btn-outline-light rounded-pill">Home</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 fade-in-up">
                <div class="glass-card p-5">
                    <div class="text-center mb-5">
                        <span class="tool-icon" style="font-size: 3rem; margin-bottom: 1rem; display: block;">📋</span>
                        <h2 class="display-5 fw-bold gradient-text">Priority Tasks</h2>
                        <p class="text-muted">Manage your daily priorities with glassmorphic elegance.</p>
                    </div>
                    <div class="input-group mb-5">
                        <input type="text" id="taskInput" class="form-control me-2" placeholder="What needs to be done?">
                        <button class="btn btn-premium px-5" onclick="addTask()">Add Task</button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="text-light-50 fw-600 mb-0">Active Tasks</h5>
                        <span id="count" class="badge rounded-pill bg-primary px-3">0</span>
                    </div>
                    <ul id="taskList" class="list-group list-group-flush"></ul>
                    <div id="noTasks" class="text-center py-5 opacity-50 italic">Your list is empty. Add a task to start!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let count = 0;
        function updateUI() {
            document.getElementById("noTasks").style.display = count === 0 ? "block" : "none";
            document.getElementById("count").innerText = count;
        }
        function addTask() {
            const input = document.getElementById("taskInput");
            if (!input.value.trim()) return alert("Enter a task");
            const li = document.createElement("li");
            li.className = "list-group-item fade-in-up";
            li.innerHTML = `<span style="flex-grow:1">${input.value.trim()}</span><button class="btn-delete" onclick="deleteTask(this)"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>`;
            document.getElementById("taskList").appendChild(li);
            input.value = ""; count++; updateUI();
        }
        function deleteTask(btn) { btn.closest("li").remove(); count--; updateUI(); }
        document.getElementById("taskInput").addEventListener("keypress", (e) => { if (e.key === "Enter") addTask(); });
    </script>
</body>
</html>
